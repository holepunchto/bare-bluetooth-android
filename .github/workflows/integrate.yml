name: Integrate
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: holepunchto/actions/node-base@current
      - run: npm run lint
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
            arch: arm64
    runs-on: ${{ matrix.os }}
    name: Test / ${{ matrix.platform }}-${{ matrix.arch }}
    steps:
      - uses: holepunchto/actions/bare-base@v1
      - run: bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --debug -D ANDROID_PLATFORM=android-34 -D ANDROID_STL=c++_shared
      - run: bare-make build
      - run: bare-make install
